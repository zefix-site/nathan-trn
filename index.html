<!DOCTYPE html> 
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COD eSport League</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="logo">COD ESPORT LEAGUE</div>
    <div class="season">SAISON 2026</div>
</header>

<section class="podium-section">
    <h2>🏆 TOP 3 MONDIAL</h2>
    <div id="podium"></div>
</section>

<section class="leaderboard-section">
    <h2>Classement Global</h2>
    <div id="leaderboard"></div>
</section>

<section class="tournament-section">
    <h2>🎮 Tournois</h2>
    <div id="tournaments"></div>
</section>

<section class="addPlayer">
    <h2>Ajouter un Joueur</h2>
    <input type="text" id="playerName" placeholder="Pseudo">
    <input type="number" id="playerPoints" placeholder="Points">
    <button id="addPlayerBtn">Ajouter</button>
</section>

<script type="module" src="app.js"></script>
</body>
</html>
