<div id="adminPanel" style="display:none;">
    <div class="admin-grid">

        <!-- Création Tournoi -->
        <div class="admin-panel-card">
            <h2>📢 Créer un Tournoi</h2>
            <input type="text" id="tTitle" placeholder="Titre">
            <input type="date" id="tDate">
            <input type="number" id="tMaxPlayers" placeholder="Max joueurs">
            <input type="text" id="tPrize" placeholder="Cashprize">
            <input type="text" id="tMode" placeholder="Mode (BO3 / BO5)">
            <input type="text" id="tDescription" placeholder="Description">
            <button id="createTournament">Créer Tournoi</button>
        </div>

        <!-- Classement Joueurs -->
        <div class="admin-panel-card">
            <h2>🏆 Classement Joueurs</h2>
            <div id="leaderboardPanel"></div>
        </div>

        <!-- Gestion Joueurs -->
        <div class="admin-panel-card">
            <h2>👥 Gestion des Joueurs</h2>
            <div id="playersList"></div>
        </div>

        <!-- Tournois -->
        <div class="admin-panel-card">
            <h2>🎮 Tournois Actuels</h2>
            <div id="adminTournaments"></div>
        </div>

        <div class="admin-panel-card">
            <h2>🏁 Tournois Terminés</h2>
            <div id="finishedTournaments"></div>
        </div>

        <!-- Matchs / Brackets -->
        <div class="admin-panel-card">
            <h2>⚔️ Matchs / Brackets</h2>
            <div id="matchesList"></div>
        </div>

    </div>
</div>
